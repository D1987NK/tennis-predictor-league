services:
  db:
    image: postgres:16-alpine
    container_name: tennis_predictor_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: tennis
      POSTGRES_PASSWORD: tennis
      POSTGRES_DB: tennis_predictor
    ports:
      - "5432:5432"
    volumes:
      - tennis_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tennis -d tennis_predictor"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  tennis_pgdata:
